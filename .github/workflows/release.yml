name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-x86:
    name: Build — x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARGET="x86_64-unknown-linux-gnu"
          ARCHIVE_NAME="hostingctl-${VERSION}-${TARGET}"
          mkdir -p "dist/${ARCHIVE_NAME}"
          cp "target/${TARGET}/release/hostingctl" "dist/${ARCHIVE_NAME}/"
          cp README.md LICENSE "dist/${ARCHIVE_NAME}/" 2>/dev/null || true
          cd dist
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}/"
          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-unknown-linux-gnu
          path: |
            dist/*.tar.gz
            dist/*.sha256

  build-arm64:
    name: Build — aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARGET="aarch64-unknown-linux-gnu"
          ARCHIVE_NAME="hostingctl-${VERSION}-${TARGET}"
          mkdir -p "dist/${ARCHIVE_NAME}"
          cp "target/${TARGET}/release/hostingctl" "dist/${ARCHIVE_NAME}/"
          cp README.md LICENSE "dist/${ARCHIVE_NAME}/" 2>/dev/null || true
          cd dist
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}/"
          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-unknown-linux-gnu
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: Create GitHub Release
    needs: build-x86
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cat > release_notes.md <<EOF
          ## hostingctl ${VERSION}

          Linux server builds only.

          ### Install

          \`\`\`sh
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${VERSION}/install.sh | sh
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
            install.sh
          prerelease: ${{ contains(github.ref_name, '-') }}
